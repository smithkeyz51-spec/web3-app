<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qwerti</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
    .center { margin: 50px 0; }
    nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #eee; padding: 10px 0; }
    nav span { cursor: pointer; padding: 5px 10px; }
    nav .active { font-weight: bold; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <h2>Qwerti</h2>
</header>

<div class="center">
  <h1>Connect Your Wallet</h1>
  <p>To access your Points Dashboard.</p>
  <button id="connect-wallet-btn">Connect Wallet</button>
</div>

<nav>
  <span>Home</span>
  <span>Swap</span>
  <span id="wallet-btn">Wallet</span>
  <span id="airdrop-btn">Airdrop</span>
</nav>

<script>
const backendUrl = "https://web3-backend-7xoj.onrender.com";
let currentWallet = "";

// Connect Wallet
document.getElementById("connect-wallet-btn").addEventListener("click", async () => {
  const wallet = prompt("Enter your wallet address:");
  if (!wallet) return;
  currentWallet = wallet;

  try {
    const res = await fetch(`${backendUrl}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ wallet })
    });
    const data = await res.json();
    alert(`Welcome ${wallet}! You have ${data.points} points.`);
  } catch (err) {
    console.error(err);
    alert("Login failed. Try again!");
  }
});

// Wallet Button
document.getElementById("wallet-btn").addEventListener("click", async () => {
  if (!currentWallet) return alert("Connect your wallet first!");
  try {
    const res = await fetch(`${backendUrl}/user/${currentWallet}`);
    const data = await res.json();
    alert(`Wallet: ${currentWallet}\nPoints: ${data.points}\nTasks Completed: ${data.tasksCompleted}`);
  } catch (err) {
    console.error(err);
    alert("Failed to get user data.");
  }
});

// Airdrop Button
document.getElementById("airdrop-btn").addEventListener("click", async () => {
  if (!currentWallet) return alert("Connect your wallet first!");
  try {
    const res = await fetch(`${backendUrl}/claim`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ wallet: currentWallet })
    });
    const data = await res.json();
    alert(`Airdrop claimed! Points: ${data.points}`);
  } catch (err) {
    console.error(err);
    alert("Airdrop failed.");
  }
});
</script>

</body>
</html>
